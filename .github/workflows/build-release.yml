name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-release:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install pyinstaller PyQt5

    - name: Build with PyInstaller
      run: python -m PyInstaller --onefile --windowed --name BMIcalc-Windows --add-data "translations;translations" bmi_app.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: BMIcalc-Windows
        path: dist/BMIcalc-Windows.exe

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/BMIcalc-Windows.exe