name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-release:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Show environment info
      run: |
        python --version
        where python
        pip --version
      shell: cmd

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install pyinstaller PyQt5
        python -m pip list
      shell: cmd
      continue-on-error: false

    - name: List files
      run: |
        dir
        dir translations
      shell: cmd

    - name: Build with PyInstaller
      run: |
        python -m PyInstaller BMIcalc-Windows.spec 2>&1
      shell: cmd
      continue-on-error: false

    - name: Check dist folder
      run: |
        dir dist
      shell: cmd

    - name: Create Release
      uses: ncipollo/release-action@v1
      with:
        artifacts: "dist/BMIcalc-Windows.exe"
        token: ${{ secrets.GITHUB_TOKEN }}
        tag: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false