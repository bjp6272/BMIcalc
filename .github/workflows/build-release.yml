name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-release:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install pyinstaller PyQt5

    - name: Build with PyInstaller
      run: |
        python -m PyInstaller --onefile --windowed --name BMIcalc-Windows --add-data "translations;translations" bmi_app.py
      shell: cmd

    - name: Check dist folder
      run: dir dist
      shell: cmd

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/BMIcalc-Windows.exe