name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            ext: .exe
          - os: macos-latest
            name: macOS
            ext: ""
          - os: ubuntu-latest
            name: Linux
            ext: ""
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1 libegl1 libxkbcommon-x11-0 libdbus-1-3

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install pyinstaller PyQt5

    - name: Build with PyInstaller
      run: |
        python -m PyInstaller --onefile --windowed --name BMIcalc-${{ matrix.name }} --add-data "translations:translations" bmi_app.py
      shell: bash

    - name: Check dist folder (Unix)
      if: matrix.os != 'windows-latest'
      run: ls -la dist/

    - name: Check dist folder (Windows)
      if: matrix.os == 'windows-latest'
      run: dir dist

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: BMIcalc-${{ matrix.name }}
        path: dist/BMIcalc-${{ matrix.name }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: List artifacts
      run: ls -la artifacts/

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/*