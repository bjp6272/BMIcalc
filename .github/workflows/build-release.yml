name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-release:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install pyinstaller==6.10.0
        pip install PyQt5==5.15.10

    - name: Build with PyInstaller
      run: |
        python -m PyInstaller --onefile --windowed --name BMIcalc-Windows --add-data "translations;translations" bmi_app.py 2>&1 | Tee-Object -FilePath build.log
      shell: pwsh

    - name: Upload build log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log

    - name: Upload build log always
      uses: actions/upload-artifact@v4
      with:
        name: build-log-always
        path: build.log

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/BMIcalc-Windows.exe